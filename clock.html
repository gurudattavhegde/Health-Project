<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Digital Clock</title>\n    <style>\n        body {\n            font-family: Arial, sans-serif;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            background-color: #f4f4f4;\n        }\n        .clock {\n            font-size: 48px;\n            margin-bottom: 20px;\n        }\n    </style>\n</head>\n<body>\n    <div class="clock" id="clock">Loading...</div>\n    <script>\n        function updateClock() {\n            const utcDate = new Date();\n            const timeZones = {\n                "UTC": utcDate.toUTCString(),\n                "EST": new Date(utcDate.toLocaleString("en-US", { timeZone: "America/New_York" })).toString(),\n                "CST": new Date(utcDate.toLocaleString("en-US", { timeZone: "America/Chicago" })).toString(),\n                "PST": new Date(utcDate.toLocaleString("en-US", { timeZone: "America/Los_Angeles" })).toString()\n            };\n            document.getElementById('clock').innerHTML = \`<strong>Current Time:</strong> <br/>\${timeZones.UTC} (UTC) <br/>\${timeZones.EST} (EST) <br/>\${timeZones.CST} (CST) <br/>\${timeZones.PST} (PST) \` ;\n        }\n        setInterval(updateClock, 1000);\n        updateClock();\n    <\/script>\n</body>\n</html>
